version: '3.9'

# Solar Monitor — Docker Compose
# Run on Synology NAS alongside existing Plex/cloudflared stack.
# Secrets (inverter IPs, serial numbers) are injected via environment variables
# or a .env file — never committed to source control.

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: solarmonitor
      POSTGRES_USER: solarmonitor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # expose locally for tooling; lock down in production

  # poller:
